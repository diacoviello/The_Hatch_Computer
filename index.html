<!DOCTYPE html>
<html>
	<head>
		<title>
			Lost Timer
		</title>

		<!-- global meta -->
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width,user-scalable=no, minimum-scale=1.0, maximum-scale=1.0" />

		<!-- lost timer js -->
		<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

		<!-- lost timer css -->
		<link href="css/lost-timer.css" rel="stylesheet" type="text/css">

		<style>
			a {
				color: #049cd8;
				text-decoration: none;
			}

			a:hover {
				text-decoration: underline;
			} 

			body{
				background: #181818;
				margin: 0;
				padding: 0;
				overflow-x: hidden;
				font-family: 'apple-ii'; 
			}

			.my-timer-container {
				width: min( 692px, calc( 100vw - 40px ) );
				aspect-ratio: 1257 / 714;
				position: relative;
				/* establish a query container so the digits can be sized off the casing and scale with it */
				container-type: size;
				margin: 0 auto;
				background: url( 'assets/casing/hatch counter box.png' ) center top / 100% 100% no-repeat;
				box-shadow: none;
				border-radius: 0;
				padding: 0;
				margin-top: 20px;
				margin-bottom: 40px;
				overflow: hidden;
			}

			@media only screen and (max-width: 700px) {
				.my-timer-container {
					width: calc( 100vw - 24px );
				}
			}

			.lost-timer {
				position: absolute;
				inset: 0;
			}

			/* each digit group is positioned directly over its window cut into the casing */
			.lost-timer-side {
				position: absolute;
				top: 20.2%;
				height: 39.9%;
				box-sizing: border-box;
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 1cqw;
				padding: 0;
				margin: 0;
				background: transparent;
				box-shadow: none;
			}

			/* left window: the three minute digits */
			.lost-timer-side-left {
				float: none;
				left: 7.8%;
				width: 47.4%;
			}

			/* right window: the two second digits */
			.lost-timer-side-right {
				float: none;
				left: 59.7%;
				width: 31.3%;
				margin-left: 0;
			}

			.lost-timer-number {
				float: none;
				margin: 0;
				/* each card grows to take an equal share of its window so the cards
				   stretch to fill the space evenly rather than the gaps between them */
				flex: 1;
				min-width: 0;
			}

			.lost-timer-number-center-bar {
				display: none;
			}

			/* digits are sized off the casing (cqh/cqw) so they fill each window and scale with it;
			   width comes from the flex share of the window so the cards stretch evenly */
			.lost-flipper {
				height: 37cqh;
				width: 100%;
				font-size: 29cqh;
				border-radius: 2px;
			}

			.console-container {
				width: calc( 100% - 40px );
				margin: 0 auto;
				background: #000000;
				box-shadow: 0px 0px 10px rgba( 255, 255, 255, 0.5 );
				border-radius: 10px;
				margin-top: 40px;
				height: 250px;
				padding-left: 15px;
				padding-right: 15px;
				padding-top: 5px;
				padding-bottom: 15px;
				box-sizing: border-box;
				/* keep the prompt and input on one line; input takes whatever
				   width is left so the prompt's font size never forces a wrap */
				display: flex;
				align-items: baseline;
				text-align: center;
			}

			.console-prompt {
				font-size: 40px;
				color: #43b047;
				font-family: 'apple-ii';
			}

			.console-input {
				flex: 1;
				min-width: 0;
				margin-left: 5px;
				font-family: 'apple-ii';
				text-align: left;
			}

			.my-console {
				outline: none;
				border: none;
				box-sizing: border-box;
				font-size: 40px;
				background: transparent;
				color: #43b047;
				width: 100%;
				font-family: 'apple-ii';
				text-align: left;
			}

			.timer-modes {
				text-align: center;
				margin-top: 20px;
				font-weight: bold;
				font-size: 16px;
			}

			.timer-mode {
				margin-bottom: 10px;
			}

			.lost-timer-dev {
				width: min( 692px, calc( 100vw - 40px ) );
				margin: 20px auto 40px;
				padding: 0 20px;
				box-sizing: border-box;
			}
		</style>

		<!-- lost timer object -->
		<script src="js/lost-timer.js"></script>

		<script>
			$( function() { // doc ready
				// get url params
				var urlParams = new URLSearchParams( window.location.search );

				// get seconds from url
				var seconds = urlParams.get( 'seconds' ) ? urlParams.get( 'seconds' ) : 60 * 108;

				var timer = new lostTimer( { // create timer
					initialSeconds: parseInt( seconds ), // initial seconds to begin the timer at
					mode: urlParams.get( 'mode' ), // specify mode of dev|live
					height: $( window ).width() > 700 ? 150 : 52, // specify the height of the timer
					onTick: function() { // do things on each tick of the countdown
						if ( timer.totalSeconds <= 240 && timer.totalSeconds > 0 ) { // enable numbers input and focus on input
							$( '.my-console' ).prop( 'disabled', false );
							$( '.my-console' ).focus();
						} else { // disable the input
							$( '.my-console' ).prop( 'disabled', true );
							$( '.my-console' ).val( '' );
						}
					}
				} );

				$( '.my-console' ).on( 'keydown', function( e ) { // on keydown for console input
					timer.playAudio( 'keypress' );

					if ( e.keyCode == 13 && timer.theNumbersString == $( this ).val() ) { // enter key was pressed and numbers are correct
						// clear, disable, and reset timer
						$( '.my-console' ).val( '' );
						$( '.my-console' ).prop( 'disabled', true );
						timer.reset();
					}
				} );
			} );
		</script>
	</head>
	<body>
		<div class="my-timer-container">
			<div class="lost-timer">

			</div>
		</div>

		<div class="console-container">
			<div class="console-prompt">
				>:
			</div>
			<div class="console-input">
				<input type="text" class="my-console" /> 
			</div>
		</div>

		<div class="timer-modes">
			<div class="timer-mode">
				<a href="?mode=dev">
					Dev Mode
				</a>
			</div>
			<div class="timer-mode">
				<a href="?mode=live">
					Live Mode
				</a>
			</div>
		</div>
	</body>
</html>
